<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Lista de Compras</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d6efd">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

<main class="container my-5">

<div class="card p-4 shadow-sm">

<h2 class="mb-4">🛒 Lista de Compras</h2>

<div class="row g-3">

<div class="col-md-8">
<label class="form-label">Produto</label>
<input
type="text"
id="inputTarefa"
class="form-control"
placeholder="Ex: Salsicha, Queijo, Fatiado..."
>
</div>

<div class="col-md-4">
<label class="form-label">Quantidade</label>
<input
type="number"
id="inputQuantidade"
class="form-control"
placeholder="1"
min="1"
value="1"
>
</div>

</div>

<div class="d-flex gap-2 flex-wrap mt-3">

<button id="btnAdicionar" class="btn btn-primary">
Adicionar Item
</button>

<button id="btnLimparTudo" class="btn btn-danger">
Limpar Tudo
</button>

<button
id="btnRestaurar"
class="btn btn-secondary d-none"
>
↩ Restaurar Lista
</button>

</div>

<p id="mensagem" class="mt-3 fw-bold"></p>

<hr>

<div class="row text-center mb-3">

<div class="col-6 col-md-3">
<div class="contador-card">
<div id="totalItens">0</div>
<small>Total</small>
</div>
</div>

<div class="col-6 col-md-3">
<div class="contador-card">
<div id="totalPendentes">0</div>
<small>Pendentes</small>
</div>
</div>

<div class="col-6 col-md-3 mt-3 mt-md-0">
<div class="contador-card">
<div id="totalFalta">0</div>
<small>Em Falta</small>
</div>
</div>

<div class="col-6 col-md-3 mt-3 mt-md-0">
<div class="contador-card">
<div id="totalConcluidas">0</div>
<small>Comprados</small>
</div>
</div>

</div>

<hr>

<h3>Lista</h3>

<ul id="listaTarefas" class="list-group mt-3"></ul>

</div>

</main>

<script src="assets/js/script.js"></script>

</body>
</html>
