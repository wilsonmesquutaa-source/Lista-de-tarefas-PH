<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista de Compras</title>
  <link rel="stylesheet" href="/assets/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="bg-decoration"></div>
  
  <header class="glass">
    <h1>🛒 Lista de Compras</h1>
    <button id="btnDark" class="btn-toggle">
      🌙 Dark Mode
    </button>
  </header>

  <main>
    <section class="task-panel glass">
      <div class="stats-bar">
        <div class="stat">
          <span class="stat-number" id="statTotal">0</span>
          <span class="stat-label">Total</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat">
          <span class="stat-number" id="statHave">0</span>
          <span class="stat-label">Tenho</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat">
          <span class="stat-number" id="statNeed">0</span>
          <span class="stat-label">Falta</span>
        </div>
      </div>

      <div class="input-group">
        <input 
          type="text" 
          id="taskInput"
          placeholder="Digite um produto..."
          maxlength="100"
          aria-label="Novo produto"
        >
        <button id="btnAdd" class="btn-primary">
          <span>Adicionar</span>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M8 2v12M2 8h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>

      <div class="filters">
        <button class="filter-btn active" data-filter="all">Todas</button>
        <button class="filter-btn" data-filter="have">Tenho</button>
        <button class="filter-btn" data-filter="need">Falta</button>
      </div>

      <div class="task-list" id="taskList">
        <div class="empty-state" id="emptyState">
          <div class="empty-icon">🛒</div>
          <p class="empty-title">Sua lista está vazia</p>
          <p class="empty-subtitle">Adicione produtos acima para começar</p>
        </div>
      </div>

      <div class="task-info" id="taskInfo" style="display: none;">
        <span class="task-count" id="taskCount">0 produtos</span>
        <button class="btn-clear" id="btnClearHave">Limpar "tenho"</button>
      </div>
    </section>
  </main>

  <footer>
    Desenvolvido por Will para meu amor PH
  </footer>

  <!-- Modal de confirmação -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal glass">
      <div class="modal-icon">⚠️</div>
      <h3 class="modal-title">Excluir produto?</h3>
      <p class="modal-text">Esta ação não pode ser desfeita.</p>
      <div class="modal-actions">
        <button class="btn-secondary" id="btnCancelDelete">Cancelar</button>
        <button class="btn-danger" id="btnConfirmDelete">Excluir</button>
      </div>
    </div>
  </div>

  <script src="/assets/js/script.js"></script>
</body>
</html>
