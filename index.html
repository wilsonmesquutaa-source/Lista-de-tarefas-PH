<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Lista com localStorage e JSON</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0d6efd">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>



  <main class="container my-5">

    <section class="card p-4 shadow-sm">

      <h2 class="mb-3">Lista do que comprar</h2>

      <div class="mb-3">
        <label for="inputTarefa" class="form-label">Digite um item</label>
        <input 
          type="text" 
          id="inputTarefa" 
          class="form-control" 
          placeholder="Ex: Salsicha, Queijo, Fatiado"
        >
      </div>

      <div class="d-flex gap-2 flex-wrap">
        <button id="btnAdicionar" class="btn btn-primary">
          Adicionar tarefa
        </button>

        <button id="btnLimparTudo" class="btn btn-danger">
          Limpar tudo
        </button>
      </div>

      <p id="mensagem" class="mt-3 fw-bold"></p>

      <hr>

      <h3>Lista</h3>

      <ul id="listaTarefas" class="list-group mt-3">
        <!-- As tarefas serão adicionadas pelo JavaScript -->
      </ul>

    </section>

  </main>

  <script src="assets/js/script.js"></script>
</body>
</html>
